# =============================================================================
# ARCAS - config/prometheus/prometheus.yml
# Scrapes metrics from all ARCAS services.
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: arcas
    env:     development

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/alerts/*.yaml

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # OpenTelemetry Collector internal metrics
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]

  # ARCAS application services (FastAPI /metrics endpoint)
  - job_name: arcas-api
    static_configs:
      - targets: [arcas-api:8000]
    metrics_path: /metrics

  # ARCAS Streamlit dashboard
  - job_name: arcas-dashboard
    static_configs:
      - targets: [arcas-dashboard:8501]
    metrics_path: /metrics

  # Kafka (via JMX exporter if configured, else skip)
  - job_name: kafka
    static_configs:
      - targets: [kafka:9101]
    honor_labels: true

  # Flink
  - job_name: flink
    static_configs:
      - targets: [flink-jobmanager:8083]
    metrics_path: /

  # PostgreSQL (via postgres_exporter - add to compose if needed)
  # - job_name: postgres
  #   static_configs:
  #     - targets: [postgres-exporter:9187]

  # Neo4j (exposes metrics natively on port 2004)
  - job_name: neo4j
    static_configs:
      - targets: [neo4j:2004]
    metrics_path: /metrics

  # Node exporter - host machine metrics (add to compose if needed)
  # - job_name: node
  #   static_configs:
  #     - targets: [node-exporter:9100]
