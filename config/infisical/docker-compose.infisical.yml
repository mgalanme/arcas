# =============================================================================
# ARCAS - config/infisical/docker-compose.infisical.yml
#
# Self-hosted Infisical secrets vault.
# Uses its own dedicated PostgreSQL instance (separate from the main arcas DB).
#
# FIRST-TIME SETUP:
#   1. Generate secrets:
#        echo "INFISICAL_ENCRYPTION_KEY=$(openssl rand -hex 32)" >> ../../.env
#        echo "INFISICAL_AUTH_SECRET=$(openssl rand -base64 32)" >> ../../.env
#   2. Start: docker compose -f config/infisical/docker-compose.infisical.yml up -d
#   3. Open http://localhost:8085 and create admin account
#   4. Create project "arcas", environment "dev"
#   5. Add all secrets from .env.example
#   6. Generate a Machine Identity token -> save as INFISICAL_TOKEN in .env
#
# SUBSEQUENT STARTS: included in main docker-compose.yml --profile governance
# =============================================================================

name: arcas-infisical

networks:
  arcas-net:
    external: true

volumes:
  infisical_db_data:
    name: arcas_infisical_db_data
  infisical_data:
    name: arcas_infisical_data

services:
  infisical-db:
    image: localhost:5000/postgres:14-alpine
    container_name: arcas-infisical-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD:-infisical_internal_pwd}
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    networks:
      - arcas-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical:
    image: localhost:5000/infisical:latest-postgres
    container_name: arcas-infisical
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
    environment:
      DB_CONNECTION_URI: "postgresql://infisical:${INFISICAL_DB_PASSWORD:-infisical_internal_pwd}@infisical-db/infisical"
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      SITE_URL: "http://localhost:8085"
      TELEMETRY_ENABLED: "false"
    volumes:
      - infisical_data:/app/data
    ports:
      - "8085:8080"
    networks:
      - arcas-net
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
